    code_font: {google: "JetBrains Mono"}
  params:
    bootswatch: lumen
    ganalytics: UA-54921687-5
    mathjax: true
  in_header:
    - pkgdown/extra.css

toc:
  depth: 6

navbar:
  type: inverse
  left:
